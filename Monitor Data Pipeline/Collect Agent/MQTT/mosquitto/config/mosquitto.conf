# Mosquitto MQTT Broker Configuration
# For Monitoring Data Pipeline

# ==========================================
# Network Configuration
# ==========================================

# MQTT TCP listener
listener 1883
protocol mqtt

# MQTT WebSocket listener (optional, for web clients)
listener 9001
protocol websockets

# Allow connections from any interface
# Note: bind_address is deprecated in Mosquitto 2.0
# Mosquitto now binds to all interfaces by default

# ==========================================
# Authentication & Security
# ==========================================

# For development/testing: allow anonymous connections
# In production, you should enable authentication
allow_anonymous true

# To enable authentication (production):
# allow_anonymous false
# password_file /mosquitto/config/passwd

# ==========================================
# Logging
# ==========================================

# Log destinations: stdout, stderr, syslog, topic, file
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log

# Log types: error, warning, notice, information, all, debug
log_type error
log_type warning
log_type notice
log_type information

# Log timestamps
log_timestamp true
log_timestamp_format %Y-%m-%d %H:%M:%S

# Connection messages
connection_messages true

# ==========================================
# Persistence
# ==========================================

# Enable message persistence
persistence true
persistence_location /mosquitto/data/

# Save persistent data every 1800 seconds (30 minutes)
autosave_interval 1800

# Save on shutdown
autosave_on_changes false

# ==========================================
# Performance Tuning
# ==========================================

# Maximum number of client connections (-1 = unlimited)
max_connections -1

# Maximum number of messages to hold in queue for disconnected clients
max_queued_messages 1000

# Maximum packet size (100 MB for monitoring data)
# Note: Mosquitto 2.0+ recommends max_packet_size instead of message_size_limit
max_packet_size 104857600

# ==========================================
# Quality of Service (QoS)
# ==========================================

# Note: max_qos is deprecated in Mosquitto 2.0+
# QoS levels (0, 1, 2) are always available
# Clients can request any QoS level (0-2)

# Maximum inflight messages per client
max_inflight_messages 20

# ==========================================
# Monitoring & Statistics
# ==========================================

# Publish broker statistics to $SYS topics
# $SYS/broker/version, $SYS/broker/uptime, etc.
# These are useful for monitoring the broker itself

# ==========================================
# Notes
# ==========================================
#
# Default ports:
#   1883 - Standard MQTT (unencrypted)
#   8883 - MQTT over TLS (encrypted)
#   9001 - MQTT over WebSockets
#
# For production:
#   1. Enable TLS/SSL encryption
#   2. Enable authentication (password_file or ACL)
#   3. Set appropriate max_connections
#   4. Enable firewall rules
#
# Mosquitto 2.0+ Changes:
#   - bind_address is deprecated (binds to all interfaces by default)
#   - max_qos_level is deprecated (all QoS levels always available)
#   - listener directive is required (no default listener)
#
