syntax = "proto3";

package monitor;

// GPU Global State
message GpuGlobalState {
    double power_watts = 1;
    int32 temperature_celsius = 2;
    int32 total_load_percent = 3;
}

// Per-process metrics
message ProcessMetrics {
    int32 pid = 1;
    uint32 uid = 2;
    string command = 3;
    double cpu_usage_percent = 4;
    uint64 memory_bytes = 5;
    double gpu_sm_percent = 6;
    double gpu_mem_percent = 7;
    int32 gpu_mem_mib = 8;
}

// Complete snapshot from compute node
message ComputeNodeSnapshot {
    uint64 timestamp = 1;
    string node_id = 2;
    GpuGlobalState gpu_global_state = 3;
    repeated ProcessMetrics processes = 4;
}

// Response from server
message SnapshotResponse {
    bool success = 1;
    string message = 2;
    uint64 server_timestamp = 3;
}

// Service definition
service MonitorService {
    // Send a single snapshot
    rpc SendSnapshot(ComputeNodeSnapshot) returns (SnapshotResponse);
}